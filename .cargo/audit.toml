# cargo-audit config - the detailed rationale for each vulnerability ignore lives in deny.toml
# [advisories].ignore; this file mirrors those IDs plus its own extra unmaintained-crate ignores.
#
# This list is a SUPERSET of deny.toml's, not an identical mirror: deny.toml sets
# `unmaintained = "workspace"`, so cargo-deny only flags unmaintained crates that are direct
# workspace members and never "encounters" a transitive one (adding a transitive-unmaintained ID
# to deny.toml's ignore array makes cargo-deny error with "advisory was not encountered"). This
# file sets `output.deny = ["unmaintained"]` below, a stricter, depth-agnostic policy that fails on
# ANY unmaintained crate, transitive or not - so it needs explicit ignores that deny.toml does not.
# Verify with `cargo audit` (not just `cargo deny check`) before removing any of these.
[advisories]
ignore = [
    "RUSTSEC-2023-0071", # rsa: Marvin Attack timing side-channel; transitive via surrealdb-core -> jsonwebtoken
    "RUSTSEC-2026-0194", # quick-xml: quadratic attribute dedup; transitive via self_update -> cairn-client
    "RUSTSEC-2026-0195", # quick-xml: unbounded NsReader allocation; transitive via self_update -> cairn-client
    "RUSTSEC-2023-0089", # atomic-polyfill: unmaintained; transitive via heapless -> rstar -> geo-types -> surrealdb-core
    "RUSTSEC-2024-0436", # paste: unmaintained; transitive via tokenizers -> fastembed -> cairn-memory
    "RUSTSEC-2025-0119", # number_prefix: unmaintained; transitive via indicatif -> hf-hub -> cairn-memory
    "RUSTSEC-2025-0134", # rustls-pemfile: unmaintained; transitive via axum-server -> cairn-api
]
informational_warnings = ["unmaintained"]
severity_threshold = "low"

[database]
fetch = true
stale = false

[output]
deny = ["unmaintained"]
format = "terminal"
quiet = false
show_tree = true

[target]
arch = ["x86_64"]
os = ["linux", "windows"]

[yanked]
enabled = true