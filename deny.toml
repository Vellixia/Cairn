[graph]
all-features = false
no-default-features = false

[output]
feature-depth = 1

[advisories]
yanked = "deny"
unmaintained = "workspace"

[bans]
multiple-versions = "deny"
wildcards = "warn"
highlight = "all"
skip = [
    # Transitive duplicates from different major versions of upstream crates
    { name = "memchr", version = "2.x" },
    { name = "serde_json", version = "1.x" },
    { name = "serde_core", version = "1.x" },
    { name = "getrandom", version = "0.x" },
    { name = "webpki-roots", version = "0.x" },
    { name = "tower-http", version = "0.x" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
