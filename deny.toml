[graph]
all-features = false
no-default-features = false

[output]
feature-depth = 1

[advisories]
yanked = "deny"
unmaintained = "workspace"
# Each ignore below is a transitive dependency we can't easily upgrade without breaking the
# workspace's pinned minor-version policy. The advisory database entry is linked in each line.
#
# NOTE: RUSTSEC-2024-0436 (`paste` via rust-embed), RUSTSEC-2025-0119 (`number_prefix` via
# indicatif/human-panic), and RUSTSEC-2025-0134 (`rustls-pemfile` via axum-server 0.7.x) were
# removed here in v0.8.0 Sprint 1 - re-resolving Cargo.lock for the SurrealDB addition bumped
# these transitive deps past the affected versions, so the ignores are now dead (`cargo deny`
# reports "advisory was not encountered" if they're kept).
ignore = [
    # RUSTSEC-2023-0071 - `rsa`: Marvin Attack timing side-channel (no safe upgrade available
    # upstream). Transitive via surrealdb-core -> jsonwebtoken 10.x (used for SurrealDB's own
    # JWKS/RSA auth token verification). Cairn's bundled docker-compose stack authenticates to
    # SurrealDB with root user/pass, never RSA-signed tokens, so this code path is unreached in
    # our deployment; re-evaluate when surrealdb-core migrates off the vulnerable jsonwebtoken
    # version or the `rsa` crate ships a constant-time implementation.
    "RUSTSEC-2023-0071",
]

[bans]
multiple-versions = "deny"
wildcards = "warn"
highlight = "all"
# Skip list rationale: every entry below is a duplicate-version of a crate pulled in by multiple
# upstream paths (different major versions, different platform-specific generators, etc.). The
# `0.x` and `1.x` wildcards reflect the fact that some of these are pre-1.0 or semver-loose
# upstream projects where pinning to a specific version would block every minor bump. If a
# duplicate appears here and is not in the rationale groups, it must be documented before merge.
skip = [
    # Windows target crates - each arch emits its own crate, so duplicates are inevitable.
    # Generated by rustc per-target; not security-relevant.
    { name = "windows-sys", version = "0.x" },
    { name = "windows-targets", version = "0.x" },
    { name = "windows_aarch64_gnullvm", version = "0.x" },
    { name = "windows_aarch64_msvc", version = "0.x" },
    { name = "windows_i686_gnu", version = "0.x" },
    { name = "windows_i686_msvc", version = "0.x" },
    { name = "windows_x86_64_gnu", version = "0.x" },
    { name = "windows_x86_64_gnullvm", version = "0.x" },
    { name = "windows_x86_64_msvc", version = "0.x" },

    # Apple platform crates - same rationale as Windows target crates.
    { name = "core-foundation", version = "0.x" },
    { name = "r-efi", version = "5.x" },

    # String-handling crates with multiple majors in the dependency tree.
    # memchr 2.x and serde_json 1.x are pulled in by both tree-sitter and the main crate set.
    { name = "memchr", version = "2.x" },
    { name = "serde_json", version = "1.x" },
    { name = "serde_core", version = "1.x" },

    # Workspace intentionally pins to ureq 2.x; ureq 3.x has API differences.
    # The skip is a safety net for transitive deps that may pull 3.x.
    { name = "ureq", version = "2.x" },

    # thiserror 1.x is a transitive of older serde-derive paths; thiserror 2.x is our direct dep.
    # Both coexist in the lockfile because some crates haven't bumped.
    { name = "thiserror", version = "1.x" },
    { name = "thiserror-impl", version = "1.x" },

    # Random / WASI / crypto plumbing - transitive from multiple paths. Not security-relevant
    # duplicates; same crate, different feature flags resolving to different versions.
    { name = "getrandom", version = "0.x" },
    { name = "webpki-roots", version = "0.x" },
    { name = "tower-http", version = "0.x" },
    { name = "wit-bindgen", version = "0.x" },

    # --- surrealdb (v0.8.0 Sprint 1) ---------------------------------------------------------
    # SurrealDB (`surrealdb ~3.1`, client-only via `protocol-ws`) brings its own large,
    # independently-versioned dependency universe (surrealdb-core bundles a gRPC stack via
    # tonic, its own rand/crypto/hash pins, and the rkyv zero-copy serialization family). None
    # of these overlap with anything security-sensitive Cairn calls directly; they're isolated
    # inside surrealdb-core's internals. Re-evaluate this block whenever surrealdb is bumped -
    # a later release may unify some of these with the rest of the workspace.

    # surrealdb-core's own web/RPC stack (tonic pulls a newer axum than our `~0.7` pin).
    { name = "axum", version = "0.x" },
    { name = "axum-core", version = "0.x" },
    { name = "matchit", version = "0.x" },
    { name = "reqwest", version = "0.x" },
    { name = "jsonwebtoken", version = "*" }, # 9.x (ours) vs 10.x (surrealdb-core)
    { name = "syn", version = "*" },          # 1.x (older transitive) vs 2.x (surrealdb-core)
    { name = "heck", version = "0.x" },

    # surrealdb-core's own rand/hash/crypto pins (independent of our `rand ~0.8` workspace pin).
    { name = "rand", version = "0.x" },
    { name = "rand_chacha", version = "0.x" },
    { name = "rand_core", version = "0.x" },
    { name = "ahash", version = "0.x" },
    { name = "foldhash", version = "0.x" },
    { name = "hashbrown", version = "0.x" },
    { name = "cpufeatures", version = "0.x" },
    { name = "untrusted", version = "0.x" },
    { name = "base64", version = "0.x" }, # our workspace pin is `base64 ~0.22`; this is the 0.13 outlier

    # rkyv zero-copy serialization family - used internally by surrealkv/surrealdb-core for its
    # storage layer. All entries here belong to the same rkyv 0.7-vs-0.8 major-version split.
    { name = "rkyv", version = "0.x" },
    { name = "rkyv_derive", version = "0.x" },
    { name = "ptr_meta", version = "0.x" },
    { name = "ptr_meta_derive", version = "0.x" },
    { name = "rend", version = "0.x" },
    { name = "as-slice", version = "0.x" },
    { name = "generic-array", version = "0.x" },
    { name = "hash32", version = "0.x" },
    { name = "heapless", version = "0.x" },

    # TOML/parser-combinator stack - surrealdb-core parses its own config with a newer
    # toml_edit/winnow than our direct `toml_edit ~0.22` dep (added alongside this).
    { name = "winnow", version = "*" },
    { name = "toml_edit", version = "*" },
    { name = "toml_datetime", version = "*" },
    { name = "nom", version = "*" },

    # Misc surrealdb-core internals: geo-index (rstar), CLI progress (console/indicatif),
    # vector/array math (ndarray/itertools), platform dirs (dirs-sys/redox_users), and a
    # trailing batch of `windows-*` crates pulled by a newer `windows-rs` than our other deps use.
    { name = "rstar", version = "0.x" },
    { name = "console", version = "0.x" },
    { name = "indicatif", version = "0.x" },
    { name = "ndarray", version = "0.x" },
    { name = "itertools", version = "0.x" },
    { name = "dirs-sys", version = "0.x" },
    { name = "redox_users", version = "0.x" },
    { name = "windows-core", version = "0.x" },
    { name = "windows-link", version = "0.x" },
    { name = "windows-result", version = "0.x" },
    { name = "windows-strings", version = "0.x" },
    { name = "windows_i686_gnullvm", version = "0.x" },

    # --- tokio-cron-scheduler (v0.8.0 Sprint 4) ----------------------------------------------
    # The in-process cron scheduler's `chrono-tz` dependency pins `phf`/`phf_shared` 0.12.x,
    # one major behind the 0.13.x that surrealdb-core's stack already put in the skip list
    # above. Same story as everything else here: an internal, non-security-sensitive dep of a
    # dep, isolated inside chrono-tz's own timezone-table lookups.
    { name = "phf", version = "0.x" },
    { name = "phf_shared", version = "0.x" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
